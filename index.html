                    { name: "Brown Sugar", weight: 3.3 },
                    { name: "Salt", weight: 2.1 }
                ],
                inclusions: [
                    { name: "Jalapeno", weight: 4.8 },
                    { name: "Cheese", weight: 5.8 }
                ]
            },
            "BB_bagels": {
                dough: [
                    { name: "Flour", weight: 68.7 },
                    { name: "Water", weight: 28.1 },
                    { name: "Starter", weight: 20.5 },
                    { name: "Blue Agave", weight: 4 },
                    { name: "Brown Sugar", weight: 4 },
                    { name: "Salt", weight: 2.1 }
                ],
                inclusions: [
                    { name: "Dried Blueberry", weight: 7.4 }
                ]
            },
            "blueberry_jack": {
                dough: [
                    { name: "Flour", weight: 398.8 },
                    { name: "Water", weight: 247.2 },
                    { name: "Starter", weight: 100 },
                    { name: "Salt", weight: 12.8 }
                ],
                inclusions: [
                    { name: "Dried Blueberries", weight: 59.8 },
                    { name: "Pepper Jack Cheese", weight: 91.7 }
                ]
            }
        };

        // We store the base weight for each card independently
        let baseWeights = { 1: 0, 2: 0, 3: 0 };

        function loadRecipe(cardId) {
            const recipeKey = document.getElementById(`recipe-select-${cardId}`).value;
            const recipe = recipes[recipeKey];
            
            let weight = 0;
            if (recipe.dough) weight += recipe.dough.reduce((sum, item) => sum + item.weight, 0);
            if (recipe.inclusions) weight += recipe.inclusions.reduce((sum, item) => sum + item.weight, 0);
            
            baseWeights[cardId] = weight;
            
            document.getElementById(`multiplier-${cardId}`).value = 1;
            document.getElementById(`target-weight-${cardId}`).value = weight;
            
            calculate(cardId, 1, "Standard");
        }

        function scaleByMultiplier(cardId) {
            const multField = document.getElementById(`multiplier-${cardId}`);
            let multiplier = parseFloat(multField.value) || 0;
            
            document.getElementById(`target-weight-${cardId}`).value = Math.round(baseWeights[cardId] * multiplier);
            calculate(cardId, multiplier, "Multiplier");
        }

        function scaleByTarget(cardId) {
            const targetField = document.getElementById(`target-weight-${cardId}`);
            let targetWeight = parseFloat(targetField.value) || 0;
            
            let calculatedMultiplier = targetWeight / baseWeights[cardId];
            document.getElementById(`multiplier-${cardId}`).value = calculatedMultiplier ? calculatedMultiplier.toFixed(2) : "";
            
            calculate(cardId, calculatedMultiplier, "Target Weight");
        }

        function calculate(cardId, multiplier, mode) {
            const recipeKey = document.getElementById(`recipe-select-${cardId}`).value;
            const recipe = recipes[recipeKey];
            
            const listContainer = document.getElementById(`ingredient-list-${cardId}`);
            const totalYieldContainer = document.getElementById(`total-yield-${cardId}`);
            document.getElementById(`scaling-mode-${cardId}`).innerText = `Mode: ${mode}`;
            
            listContainer.innerHTML = '';
            let totalYield = 0;

            function renderSection(title, items, shouldSort) {
                if (!items || items.length === 0) return;
                
                let displayItems = [...items];

                if (shouldSort) {
                    const priorityOrder = ["Starter", "Water", "Salt", "Flour"];
                    displayItems.sort((a, b) => {
                        let rankA = priorityOrder.indexOf(a.name);
                        let rankB = priorityOrder.indexOf(b.name);
                        
                        if (rankA === -1) rankA = 100;
                        if (rankB === -1) rankB = 100;
                        
                        return rankA - rankB;
                    });
                }
                
                const headerLi = document.createElement('li');
                headerLi.className = "text-sm font-bold text-gray-400 uppercase tracking-wider mt-4 mb-1 border-b-2 border-gray-200 pb-1";
                headerLi.innerText = title;
                listContainer.appendChild(headerLi);

                displayItems.forEach(item => {
                    // Changed rounding from Math.round to toFixed(1) for finer decimal control, since you entered decimals for your new recipes!
                    const scaledWeight = (item.weight * multiplier).toFixed(1);
                    totalYield += parseFloat(scaledWeight);

                    // Clean up trailing .0 so it looks clean for whole numbers
                    const displayWeight = scaledWeight.endsWith('.0') ? scaledWeight.slice(0, -2) : scaledWeight;

                    const li = document.createElement('li');
                    li.className = "flex justify-between text-gray-700 text-lg py-1 border-b border-gray-100 last:border-none pl-2";
                    li.innerHTML = `<span>${item.name}</span> <span class="font-bold text-gray-900">${displayWeight}g</span>`;
                    listContainer.appendChild(li);
                });
            }

            renderSection("Base Dough", recipe.dough, true);
            renderSection("Inclusions / Extras", recipe.inclusions, false);

            const displayTotal = totalYield.toFixed(1).endsWith('.0') ? totalYield.toFixed(1).slice(0, -2) : totalYield.toFixed(1);
            totalYieldContainer.innerText = `${displayTotal}g`;
        }

        // Initialize all three cards on first load
        document.getElementById('recipe-select-1').value = 'og_loaf';
        document.getElementById('recipe-select-2').value = 'roasted_chile';
        document.getElementById('recipe-select-3').value = 'english_muffs';
        
        loadRecipe(1);
        loadRecipe(2);
        loadRecipe(3);
    </script>
</body>
</html>
