        let baseTotalWeight = 0;

        function loadRecipe() {
            const recipeKey = document.getElementById('recipe-select').value;
            const recipe = recipes[recipeKey];
            
            // Calculate baseline total weight by adding both arrays
            baseTotalWeight = 0;
            if (recipe.dough) baseTotalWeight += recipe.dough.reduce((sum, item) => sum + item.weight, 0);
            if (recipe.inclusions) baseTotalWeight += recipe.inclusions.reduce((sum, item) => sum + item.weight, 0);
            
            document.getElementById('multiplier').value = 1;
            document.getElementById('target-weight').value = baseTotalWeight;
            
            calculate(1, "Standard");
        }

        function scaleByMultiplier() {
            const multField = document.getElementById('multiplier');
            let multiplier = parseFloat(multField.value) || 0;
            
            document.getElementById('target-weight').value = Math.round(baseTotalWeight * multiplier);
            calculate(multiplier, "Multiplier");
        }

        function scaleByTarget() {
            const targetField = document.getElementById('target-weight');
            let targetWeight = parseFloat(targetField.value) || 0;
            
            let calculatedMultiplier = targetWeight / baseTotalWeight;
            document.getElementById('multiplier').value = calculatedMultiplier ? calculatedMultiplier.toFixed(2) : "";
            
            calculate(calculatedMultiplier, "Target Weight");
        }

        function calculate(multiplier, mode) {
            const recipeKey = document.getElementById('recipe-select').value;
            const recipe = recipes[recipeKey];
            
            const listContainer = document.getElementById('ingredient-list');
            const totalYieldContainer = document.getElementById('total-yield');
            document.getElementById('scaling-mode').innerText = `Mode: ${mode}`;
            
            listContainer.innerHTML = '';
            let totalYield = 0;

            // Helper function to render sections dynamically
            function renderSection(title, items, shouldSort) {
                if (!items || items.length === 0) return;
                
                // Copy the array so we don't mess up the original database order
                let displayItems = [...items];

                // Only sort if we tell it to (we only want this for the dough section)
                if (shouldSort) {
                    const priorityOrder = ["Starter", "Water", "Salt", "Flour"];
                    displayItems.sort((a, b) => {
                        let rankA = priorityOrder.indexOf(a.name);
                        let rankB = priorityOrder.indexOf(b.name);
                        
                        if (rankA === -1) rankA = 100;
                        if (rankB === -1) rankB = 100;
                        
                        return rankA - rankB;
                    });
                }
                
                // Create Header
                const headerLi = document.createElement('li');
                headerLi.className = "text-sm font-bold text-gray-500 uppercase tracking-wider mt-4 mb-1 border-b-2 border-gray-200 pb-1";
                headerLi.innerText = title;
                listContainer.appendChild(headerLi);

                // Add Items
                displayItems.forEach(item => {
                    const scaledWeight = Math.round(item.weight * multiplier);
                    totalYield += scaledWeight;

                    const li = document.createElement('li');
                    li.className = "flex justify-between text-gray-700 text-lg py-1 border-b border-gray-100 last:border-none pl-2";
                    li.innerHTML = `<span>${item.name}</span> <span class="font-bold text-gray-900">${scaledWeight}g</span>`;
                    listContainer.appendChild(li);
                });
            }

            // Render Both Sections (Notice the 'true' turns on the sorter for Dough, 'false' keeps Inclusions as-is)
            renderSection("Base Dough", recipe.dough, true);
            renderSection("Inclusions / Extras", recipe.inclusions, false);

            totalYieldContainer.innerText = `${totalYield}g`;
        }
